<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/Online-Furniture-Store/styles/login.css">
</head>

<body>

    <div class="login-container">

        <h1>Login</h1>

        <p class="login-text">
            Don’t have an account?
            <a href="/Online-Furniture-Store/structure/singup.html">Sign Up</a>
        </p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="terms">
            * By logging in, you agree to our Terms of Use and Privacy Policy.
        </p>

    </div>

    <script src="/Online-Furniture-Store/scripts/login.js"></script>

</body>
</html>
