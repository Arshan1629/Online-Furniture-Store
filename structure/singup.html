<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/Online-Furniture-Store/styles/singup.css">
</head>
<body>

    <div class="singup-container">
        <h1>Sign Up</h1>
        <p class="login-text">
            Already have an account? <a href="#">Log in</a>
        </p>

        <form onsubmit="singupUser(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Choose a password" required>
    
    <button type="submit">Sign Up</button>
</form>

        <p class="terms">
            * By signing up, you agree to our Terms of Use and acknowledge you’ve read our Privacy Policy.<br><br>  
            This site is protected by reCAPTCHA Enterprise. Google’s Privacy Policy and Terms of Service apply.
        </p>
    </div>

    <script src="singup.js"></script>

    <script>
function singupUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:8080/signup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
    });
}
</script>
</body>
</html>
