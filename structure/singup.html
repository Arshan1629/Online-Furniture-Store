<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/Online-Furniture-Store/styles/singup.css">
</head>
<body>

    <div class="singup-container">
        <h1>Sign Up</h1>
        <p class="login-text">
            Already have an account? <a href="#">Log in</a>
        </p>

     <form onsubmit="singupUser(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Choose a password" required>

    <button type="button" onclick="singupUser()">Sign Up</button>
<script>
console.log("JS WORKING");

function singpuUser(event) {
    event.preventDefault();

    console.log("Signup button clicked");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:8080/signup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.text())
    .then(data => {
        console.log("Response:", data);
        alert(data);
    })
    .catch(err => console.error(err));
}
</script>

<script>
console.log("INLINE JS WORKING");

function singupUser(event) {
    event.preventDefault();
    console.log("BUTTON CLICKED");
}
</script>
</body>
</html>
