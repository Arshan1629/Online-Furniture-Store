<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Contact Us</a>
        </div>

        <div class="nav-right">
           <a href="login.html"><button class="login">Login</button></a>
            <button class="signup">Sign Up</button>
        </div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-page">
        <h1>Contact Us <span class="line"></span></h1>

        <p class="subtitle">
            Need to get in touch with us ? Fill out the form with your inquiry
            and please wait our team to contact us.
        </p>

        <!-- FORM -->
        <div class="form-box">
            <form id="contactForm">

                <div class="row">
                    <div class="field">
                        <label>First name*</label>
                        <input type="text" required>
                    </div>

                    <div class="field">
                        <label>Last name</label>
                        <input type="text">
                    </div>
                </div>

                <div class="field">
                    <label>Email*</label>
                    <input type="email" required>
                </div>

                <div class="field">
                    <label>What can we help you?</label>
                    <textarea rows="3"></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>

            </form>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Copyright © 2025 AN Repair Services . All rights reserved.</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
