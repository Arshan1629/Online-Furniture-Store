<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="signup-container">
        <h1>Sign Up</h1>
        <p class="login-text">
            Already have an account? <a href="#">Log in</a>
        </p>

        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Choose a password" required>
            <input type="password" placeholder="Confirm password" required>

            <button type="submit">Sing Up</button>
        </form>

        <p class="terms">
            * By signing up, you agree to our Terms of Use and acknowledge you’ve read our Privacy Policy.<br>
            This site is protected by reCAPTCHA Enterprise. Google’s Privacy Policy and Terms of Service apply.
        </p>
    </div>

    <script src="signup.js"></script>
</body>
</html>
